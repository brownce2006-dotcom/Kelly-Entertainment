  <style data-from="ds/colors_and_type.css">
/* ============================================================
   Meta Design System — Colors & Typography
   ============================================================
   Optimistic VF is Meta's proprietary variable face.
   We substitute Montserrat (from the documented fallback chain)
   loaded from Google Fonts. ss01/ss02 stylistic sets cannot
   be matched in the substitute — flag for user to provide
   Optimistic VF font files.
   ============================================================ */

@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap");

:root {
  /* --- Brand & accent ---------------------------------------- */
  --color-primary:        #0064e0;  /* cobalt — buy-now CTAs only */
  --color-primary-deep:   #0457cb;  /* pressed, active links */
  --color-primary-soft:   #0091ff;  /* informational tint */
  --color-on-primary:     #ffffff;
  --color-ink-button:     #000000;  /* marketing CTAs */
  --color-on-ink-button:  #ffffff;
  --color-fb-blue:        #1876f2;  /* form focus / selected */
  --color-meta-link:      #385898;  /* legacy nav, footer */
  --color-oculus-purple:  #a121ce;  /* Quest accent */

  /* --- Semantic --------------------------------------------- */
  --color-success:         #31a24c;
  --color-success-bg:      #24e400;
  --color-attention:       #f2a918;
  --color-warning:         #f7b928;  /* yellow promo banners */
  --color-warning-bg:      #ffe200;
  --color-critical:        #e41e3f;
  --color-critical-strong: #f0284a;

  /* --- Surface ---------------------------------------------- */
  --color-canvas:        #ffffff;
  --color-surface-soft:  #f1f4f7;
  --color-hairline:      #ced0d4;
  --color-hairline-soft: #dee3e9;

  /* --- Text ------------------------------------------------- */
  --color-ink-deep:     #0a1317;
  --color-ink:          #1c1e21;
  --color-charcoal:     #444950;
  --color-slate:        #4b4c4f;
  --color-steel:        #5d6c7b;
  --color-stone:        #8595a4;
  --color-disabled:     #bcc0c4;

  /* --- Spacing (4 base / 8 dominant) ------------------------ */
  --space-xxs:        4px;
  --space-xs:         8px;
  --space-sm:        10px;
  --space-md:        12px;
  --space-base:      16px;
  --space-lg:        20px;
  --space-xl:        24px;
  --space-xxl:       32px;
  --space-xxxl:      40px;
  --space-section-sm: 48px;
  --space-section:    64px;
  --space-section-lg: 80px;
  --space-hero:      120px;

  /* --- Radius ----------------------------------------------- */
  --radius-xs:      2px;
  --radius-sm:      4px;
  --radius-md:      6px;
  --radius-lg:      8px;
  --radius-xl:     16px;
  --radius-xxl:    24px;
  --radius-xxxl:   32px;
  --radius-feature: 40px;
  --radius-full:  100px;
  --radius-circle: 9999px;

  /* --- Elevation -------------------------------------------- */
  --shadow-flat:    none;
  --shadow-pill:    rgba(0, 0, 0, 0.2) 1px 1px 0 0;
  --shadow-sticky:  rgba(20, 22, 26, 0.3) 0 1px 4px 0;

  /* --- Type stack ------------------------------------------- */
  --font-display: "Optimistic VF", "Optimistic Display", Montserrat,
                   Helvetica, Arial, "Noto Sans", sans-serif;
  --font-body:    "Optimistic VF", Montserrat, Helvetica, Arial,
                   "Noto Sans", sans-serif;
  --font-mono:    "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;

  /* --- Type roles (size / weight / line-height / tracking) -- */
  --type-hero-display:  500 64px/1.16 var(--font-display);
  --type-display-lg:    500 48px/1.17 var(--font-display);
  --type-heading-lg:    500 36px/1.28 var(--font-display);
  --type-heading-md:    300 28px/1.21 var(--font-display);
  --type-heading-sm:    500 24px/1.25 var(--font-display);
  --type-subtitle-lg:   700 18px/1.44 var(--font-body);
  --type-subtitle-md:   400 18px/1.44 var(--font-body);
  --type-body-md-bold:  700 16px/1.50 var(--font-body);
  --type-body-md:       400 16px/1.50 var(--font-body);
  --type-body-sm-bold:  700 14px/1.43 var(--font-body);
  --type-body-sm:       400 14px/1.43 var(--font-body);
  --type-caption-bold:  700 12px/1.33 var(--font-body);
  --type-caption:       400 12px/1.33 var(--font-body);
  --type-button-md:     700 14px/1.43 var(--font-body);
  --type-link-md:       700 16px/1.50 var(--font-body);
}

/* OpenType stylistic sets — engaged on every Optimistic heading.
   Montserrat doesn't carry ss01/ss02; harmless when font lacks them. */
.osf-ss {
  font-feature-settings: "ss01" on, "ss02" on;
}

/* ============================================================
   Semantic element defaults
   ============================================================ */

html, body {
  background: var(--color-canvas);
  color: var(--color-ink);
  font: var(--type-body-md);
  letter-spacing: -0.16px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, .h1 {
  font: var(--type-hero-display);
  color: var(--color-ink-deep);
  font-feature-settings: "ss01" on, "ss02" on;
  letter-spacing: -0.02em;
  margin: 0;
}
h2, .h2 {
  font: var(--type-display-lg);
  color: var(--color-ink-deep);
  font-feature-settings: "ss01" on, "ss02" on;
  letter-spacing: -0.01em;
  margin: 0;
}
h3, .h3 {
  font: var(--type-heading-lg);
  color: var(--color-ink-deep);
  font-feature-settings: "ss01" on, "ss02" on;
  margin: 0;
}
h4, .h4 {
  font: var(--type-heading-md);
  color: var(--color-ink-deep);
  font-feature-settings: "ss01" on, "ss02" on;
  margin: 0;
}
h5, .h5 {
  font: var(--type-heading-sm);
  color: var(--color-ink-deep);
  font-feature-settings: "ss01" on, "ss02" on;
  margin: 0;
}
h6, .h6 {
  font: var(--type-subtitle-lg);
  color: var(--color-ink);
  margin: 0;
}

p   { font: var(--type-body-md); color: var(--color-ink); letter-spacing: -0.16px; margin: 0; }
small { font: var(--type-body-sm); color: var(--color-steel); letter-spacing: -0.14px; }
.caption { font: var(--type-caption); color: var(--color-steel); }
.subtitle { font: var(--type-subtitle-md); color: var(--color-charcoal); }

a, .link {
  color: var(--color-primary-deep);
  text-decoration: none;
  font: var(--type-link-md);
}
a:hover, .link:hover { text-decoration: underline; }

/* ============================================================
   Reusable utility classes
   ============================================================ */
.pill-full   { border-radius: var(--radius-full); }
.card-xxxl   { border-radius: var(--radius-xxxl); }
.card-xl     { border-radius: var(--radius-xl); }
.hairline    { border: 1px solid var(--color-hairline-soft); }

</style>
  <style data-from="ds/marketing.css">
/* Marketing-kit-specific styling. Tokens come from ../../colors_and_type.css */

* { box-sizing: border-box; }
body { margin: 0; background: var(--color-canvas); font-family: var(--font-body); color: var(--color-ink); }

.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 32px var(--space-hero);
}

/* --- Buttons (marketing surface) --- */
.btn-primary, .btn-buy, .btn-secondary {
  font: var(--type-button-md);
  letter-spacing: -0.14px;
  border-radius: var(--radius-full);
  cursor: pointer;
  border: 0;
  transition: background 150ms ease-out, color 150ms ease-out, transform 100ms ease-out;
}
.btn-primary { background: #000; color: #fff; padding: 14px 30px; }
.btn-primary:active { background: var(--color-charcoal, #444950); }
.btn-buy { background: var(--color-primary); color: #fff; padding: 14px 30px; }
.btn-buy:active { background: var(--color-primary-deep); }
.btn-secondary {
  background: transparent; color: var(--color-ink-deep);
  padding: 12px 28px; border: 2px solid var(--color-ink-deep);
}
.btn-secondary-on-dark { color: #fff; border-color: #fff; }

/* --- Eyebrow tag --- */
.meta-eyebrow {
  font: var(--type-body-sm-bold);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--color-primary);
}

/* --- Nav --- */
.meta-nav { position: sticky; top: 0; z-index: 20; }
.meta-promo {
  background: var(--color-ink-deep);
  color: #fff;
  font: var(--type-body-sm-bold);
  letter-spacing: -0.14px;
  text-align: center;
  padding: var(--space-md) var(--space-xl);
}
.meta-promo a { color: #fff; text-decoration: underline; margin-left: 8px; }
.meta-nav-row {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 32px;
  background: var(--color-canvas);
  border-bottom: 1px solid var(--color-hairline-soft);
}
.meta-logo {
  font-family: var(--font-display);
  font-weight: 700; font-size: 26px;
  letter-spacing: -1.5px;
  color: var(--color-ink-deep);
  background: linear-gradient(135deg, #0064e0, #0091ff 55%, #a121ce);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
}
.meta-tabs { display: flex; gap: 8px; margin-left: 8px; }
.meta-tab {
  font: var(--type-body-sm-bold); letter-spacing: -0.14px;
  padding: 8px 16px; border-radius: var(--radius-full);
  background: #fff; color: var(--color-ink); border: 1px solid var(--color-hairline);
  cursor: pointer; transition: background 150ms ease-out, color 150ms ease-out;
}
.meta-tab.active { background: var(--color-ink-deep); color: #fff; border-color: var(--color-ink-deep); }
.meta-spacer { flex: 1; }
.meta-search {
  display: flex; align-items: center; gap: 10px;
  height: 40px; padding: 0 16px;
  background: var(--color-surface-soft);
  border-radius: var(--radius-full);
  color: var(--color-steel);
  font: var(--type-body-sm); letter-spacing: -0.14px;
  min-width: 220px;
}
.meta-icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: #fff; border: 1px solid var(--color-hairline-soft);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--color-ink); cursor: pointer;
}

/* --- Hero --- */
.meta-hero { margin-top: 24px; }
.meta-hero-photo {
  position: relative;
  border-radius: var(--radius-xxxl);
  overflow: hidden;
  aspect-ratio: 16 / 9;
  background: var(--color-ink-deep);
}
.meta-hero-photo svg { width: 100%; height: 100%; display: block; }
.meta-hero-overlay {
  position: absolute; left: 56px; bottom: 56px; max-width: 540px;
  display: flex; flex-direction: column; gap: 18px;
  color: #fff;
}
.meta-hero-overlay .meta-eyebrow { color: #fff; opacity: 0.8; }
.meta-hero-title {
  font: var(--type-hero-display);
  color: #fff; letter-spacing: -0.02em;
  margin: 0;
}
.meta-hero-sub {
  font: var(--type-subtitle-md);
  color: #f1f4f7; max-width: 480px; margin: 0;
}
.meta-hero-cta-row { display: flex; gap: 12px; margin-top: 6px; }

/* --- Feature cards (3-up) --- */
.meta-feature-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  margin-top: var(--space-section-lg);
}
.meta-feature.full { grid-column: 1 / -1; }
.meta-feature {
  border-radius: var(--radius-xxxl);
  overflow: hidden;
  display: flex; flex-direction: column;
  background: var(--color-canvas);
}
.meta-feature-photo { aspect-ratio: 4 / 3; background: var(--color-surface-soft); }
.meta-feature-photo svg { width: 100%; height: 100%; display: block; }
.meta-feature-copy { padding: 28px 32px 32px; display: flex; flex-direction: column; gap: 6px; }
.meta-feature-title {
  font: var(--type-heading-lg);
  color: var(--color-ink-deep);
  font-feature-settings: "ss01" on, "ss02" on;
  margin: 0;
}
.meta-feature-body {
  font: var(--type-subtitle-md);
  color: var(--color-charcoal); margin: 0;
}
.meta-feature.light .meta-feature-photo { background: #f1f4f7; }
.meta-feature.dark  .meta-feature-photo { background: var(--color-ink-deep); }

/* --- Promo strip --- */
.meta-promo-strip {
  margin-top: var(--space-section-lg);
  background: var(--color-ink-deep);
  border-radius: var(--radius-xxxl);
  padding: var(--space-section);
  display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center;
  color: #fff;
}
.meta-promo-strip-copy { display: flex; flex-direction: column; gap: 12px; }
.meta-promo-strip-copy h2 { font: var(--type-display-lg); margin: 0; letter-spacing: -0.01em; }
.meta-promo-strip-body { font: var(--type-subtitle-md); color: #ced0d4; margin: 0 0 8px; }

/* --- Reassurance --- */
.meta-reassurance {
  margin-top: var(--space-section-lg);
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
}
.meta-reassurance-tile {
  background: #fff;
  border: 1px solid var(--color-hairline-soft);
  border-radius: var(--radius-xl);
  padding: var(--space-xxl) var(--space-xl);
  display: flex; flex-direction: column; gap: 10px;
}
.meta-reassurance-icon { color: var(--color-ink-deep); }
.meta-reassurance-icon svg { width: 32px; height: 32px; display: block; }
.meta-reassurance-title { font: var(--type-subtitle-lg); color: var(--color-ink-deep); }
.meta-reassurance-body  { font: var(--type-body-sm); color: var(--color-steel); letter-spacing: -0.14px; }

/* --- FAQ --- */
.meta-faq { margin-top: var(--space-section-lg); }
.meta-faq h3 { font: var(--type-heading-lg); color: var(--color-ink-deep); font-feature-settings: "ss01" on, "ss02" on; }
.meta-faq-stack { display: flex; flex-direction: column; gap: 12px; }
.meta-faq-item {
  background: #fff;
  border: 1px solid var(--color-hairline-soft);
  border-radius: var(--radius-xl);
  padding: var(--space-xl);
}
.meta-faq-q {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  background: transparent; border: 0; padding: 0; cursor: pointer;
  font: var(--type-subtitle-lg); color: var(--color-ink-deep); text-align: left;
}
.meta-faq-q svg { color: var(--color-steel); flex: none; }
.meta-faq-a {
  font: var(--type-body-md); color: var(--color-charcoal); letter-spacing: -0.16px;
  padding-top: var(--space-base);
  border-top: 1px solid var(--color-hairline-soft);
  margin-top: var(--space-base);
}

/* --- Footer --- */
.meta-footer {
  margin-top: var(--space-section-lg);
  border-top: 1px solid var(--color-hairline-soft);
  padding: var(--space-section) 0 var(--space-xxl);
}
.meta-footer-cols { display: grid; grid-template-columns: repeat(5, 1fr); gap: 32px; }
.meta-footer-head { font: var(--type-body-sm-bold); color: var(--color-ink); letter-spacing: -0.14px; margin: 0 0 12px; }
.meta-footer-links { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
.meta-footer-links a { font: var(--type-body-sm); color: var(--color-steel); letter-spacing: -0.14px; text-decoration: none; }
.meta-footer-links a:hover { color: var(--color-ink); text-decoration: underline; }
.meta-footer-bottom {
  margin-top: var(--space-section);
  padding-top: var(--space-xxl);
  border-top: 1px solid var(--color-hairline-soft);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.meta-footer-fineprint {
  font: var(--type-caption); color: var(--color-stone);
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.meta-footer-fineprint a { color: var(--color-steel); text-decoration: none; }

</style>
  <style data-from="kelly.css">
/* ============================================================
   Kelly Entertainment Co. — Brand layer
   Sits on top of Meta DS tokens (ds/colors_and_type.css) and the
   Meta marketing kit (ds/marketing.css). Overrides surface
   color, accent, type, and component skin to the Kelly system.
   ============================================================ */

@import url("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Montserrat:wght@300;400;500;600;700;800&display=swap");

:root {
  /* --- Kelly palette override ------------------------------- */
  --k-canvas:        #F4EFE6;  /* warm cream — primary surface */
  --k-canvas-2:      #EDE5D6;  /* deeper cream — section break */
  --k-canvas-3:      #E4D9C2;  /* sand — sparingly */
  --k-ink:           #15110D;  /* near-black with warmth */
  --k-ink-2:         #3A332B;  /* graphite */
  --k-ink-3:         #6A6055;  /* warm steel */
  --k-ink-soft:      #9A8F80;  /* warm stone — captions */
  --k-hairline:      #D6CCB8;  /* warm hairline on cream */
  --k-hairline-soft: #E2D9C6;  /* very subtle */

  --k-accent:        #E63E11;  /* vermillion — signature */
  --k-accent-deep:   #B82A05;  /* pressed */
  --k-accent-soft:   #FBE0D2;  /* tint background */
  --k-gold:          #D4A14A;  /* warm gold — editorial */
  --k-plum:          #3A1B2E;  /* deep plum — special accents */
  --k-olive:         #4A4D2B;  /* warm olive — alt card */

  /* --- Override Meta tokens so DS components reskin --------- */
  --color-canvas:        var(--k-canvas);
  --color-surface-soft:  var(--k-canvas-2);
  --color-ink-deep:      var(--k-ink);
  --color-ink:           var(--k-ink);
  --color-ink-button:    var(--k-ink);
  --color-charcoal:      var(--k-ink-2);
  --color-slate:         var(--k-ink-2);
  --color-steel:         var(--k-ink-3);
  --color-stone:         var(--k-ink-soft);
  --color-hairline:      var(--k-hairline);
  --color-hairline-soft: var(--k-hairline-soft);
  --color-primary:       var(--k-accent);
  --color-primary-deep:  var(--k-accent-deep);
  --color-primary-soft:  var(--k-accent-soft);

  /* --- Type stack: Bricolage display + Montserrat body ------ */
  --font-display: "Bricolage Grotesque", "Optimistic VF", Montserrat, sans-serif;
  --font-body:    "Montserrat", "Optimistic VF", sans-serif;

  /* --- Type roles — bolder display, tighter tracking -------- */
  --type-hero-display:  700 84px/0.96 var(--font-display);
  --type-display-lg:    700 56px/1.02 var(--font-display);
  --type-heading-lg:    700 40px/1.08 var(--font-display);
  --type-heading-md:    500 28px/1.18 var(--font-display);
  --type-heading-sm:    600 22px/1.20 var(--font-display);
  --type-subtitle-lg:   600 18px/1.44 var(--font-body);
  --type-subtitle-md:   400 18px/1.48 var(--font-body);
}

html, body {
  background: var(--k-canvas);
  color: var(--k-ink);
}

h1, .h1, h2, .h2, h3, .h3, h4, .h4, h5, .h5 {
  letter-spacing: -0.025em;
  font-feature-settings: normal; /* bricolage doesn't need ss01 */
}

/* ============================================================
   Layout shell
   ============================================================ */
.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 40px var(--space-hero);
}

@media (max-width: 800px) {
  .page { padding: 0 20px var(--space-section-lg); }
}

/* ============================================================
   Promo strip (top)
   ============================================================ */
.k-promo {
  background: var(--k-ink);
  color: var(--k-canvas);
  font: 600 13px/1.4 var(--font-body);
  letter-spacing: 0.04em;
  text-align: center;
  padding: 12px 24px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.k-promo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--k-accent);
  display: inline-block;
  animation: k-pulse 2s ease-in-out infinite;
}
@keyframes k-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.4); opacity: 0.6; }
}
.k-promo a {
  color: var(--k-canvas);
  text-decoration: underline;
  text-underline-offset: 3px;
  font-weight: 700;
}

/* ============================================================
   Nav
   ============================================================ */
.k-nav {
  position: sticky;
  top: 0;
  z-index: 30;
  background: var(--k-canvas);
  border-bottom: 1px solid var(--k-hairline);
}
.k-nav-row {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 18px 40px;
  max-width: 1440px;
  margin: 0 auto;
}
.k-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  text-decoration: none;
}
.k-logo-mark {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--k-ink);
  color: var(--k-canvas);
  display: grid; place-items: center;
  font: 800 22px/1 var(--font-display);
  letter-spacing: -0.04em;
}
.k-logo-mark::after {
  content: '';
  position: absolute;
  inset: auto -4px -4px auto;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--k-accent);
}
.k-logo-mark { position: relative; }
.k-logo-text {
  font: 700 17px/1 var(--font-display);
  color: var(--k-ink);
  letter-spacing: -0.02em;
}
.k-logo-text .reg { font-size: 9px; vertical-align: super; margin-left: 2px; color: var(--k-ink-3); font-weight: 500; }
.k-nav-links {
  display: flex; gap: 4px; margin-left: 16px;
}
.k-nav-link {
  font: 600 14px/1 var(--font-body);
  letter-spacing: -0.01em;
  white-space: nowrap;
  padding: 10px 16px;
  border-radius: var(--radius-full);
  color: var(--k-ink-2);
  background: transparent;
  border: 0;
  cursor: pointer;
  transition: background 150ms ease-out, color 150ms ease-out;
}
.k-nav-link:hover { background: var(--k-canvas-2); color: var(--k-ink); }
.k-nav-link.active {
  background: var(--k-ink); color: var(--k-canvas);
}
.k-nav-spacer { flex: 1; }
.k-icon-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--k-hairline);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--k-ink);
  cursor: pointer;
  transition: background 150ms ease-out, border-color 150ms ease-out;
}
.k-icon-btn:hover { background: var(--k-canvas-2); border-color: var(--k-ink-2); }
.k-cta-pill {
  font: 700 14px/1 var(--font-body);
  letter-spacing: -0.01em;
  padding: 12px 22px;
  background: var(--k-ink);
  color: var(--k-canvas);
  border: 0;
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: background 150ms ease-out, transform 100ms ease-out;
}
.k-cta-pill:hover { background: var(--k-ink-2); }
.k-cta-pill:active { transform: scale(0.97); }
.k-cta-pill.accent { background: var(--k-accent); color: #fff; }
.k-cta-pill.accent:hover { background: var(--k-accent-deep); }
.k-cta-pill.ghost {
  background: transparent;
  color: var(--k-ink);
  border: 1.5px solid var(--k-ink);
}
.k-cta-pill.ghost:hover { background: var(--k-ink); color: var(--k-canvas); }
.k-cta-pill.ghost-light {
  background: transparent;
  color: var(--k-canvas);
  border: 1.5px solid var(--k-canvas);
}
.k-cta-pill.ghost-light:hover { background: var(--k-canvas); color: var(--k-ink); }

/* ============================================================
   Hero
   ============================================================ */
.k-hero {
  margin-top: 24px;
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 18px;
  align-items: stretch;
}
.k-hero-copy-card {
  background: var(--k-canvas-2);
  border-radius: var(--radius-xxxl);
  padding: 56px 56px 48px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 560px;
  position: relative;
  overflow: hidden;
}
.k-hero-art {
  background: var(--k-ink);
  border-radius: var(--radius-xxxl);
  overflow: hidden;
  position: relative;
  min-height: 560px;
}
.k-hero-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.k-eyebrow {
  font: 600 12px/1 var(--font-body);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--k-accent);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.k-eyebrow.on-dark { color: var(--k-canvas); opacity: 0.85; }
.k-eyebrow::before {
  content: '';
  width: 24px; height: 1.5px;
  background: currentColor;
  display: inline-block;
}
.k-hero-title {
  font: var(--type-hero-display);
  color: var(--k-ink);
  letter-spacing: -0.04em;
  margin: 28px 0 20px;
  text-wrap: balance;
}
.k-hero-title .accent { color: var(--k-accent); font-style: italic; font-weight: 700; }
.k-hero-sub {
  font: 400 19px/1.5 var(--font-body);
  color: var(--k-ink-2);
  max-width: 460px;
  margin: 0 0 32px;
}
.k-hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
.k-hero-meta {
  display: flex; gap: 28px; margin-top: 40px;
  padding-top: 28px;
  border-top: 1px solid var(--k-hairline);
}
.k-hero-meta-item .num {
  font: 700 28px/1 var(--font-display);
  letter-spacing: -0.03em;
  color: var(--k-ink);
}
.k-hero-meta-item .lbl {
  font: 500 12px/1.3 var(--font-body);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--k-ink-3);
  margin-top: 6px;
  display: block;
}

/* ============================================================
   Section header
   ============================================================ */
.k-section {
  margin-top: var(--space-section-lg);
}
.k-section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 32px; margin-bottom: 36px;
}
.k-section-title {
  font: var(--type-display-lg);
  color: var(--k-ink);
  letter-spacing: -0.035em;
  margin: 0;
  max-width: 720px;
  text-wrap: balance;
}
.k-section-title .accent { color: var(--k-accent); font-style: italic; }
.k-section-lede {
  font: 400 17px/1.55 var(--font-body);
  color: var(--k-ink-2);
  max-width: 360px;
  text-align: right;
}

/* ============================================================
   Divisions — alternating editorial rows
   ============================================================ */
.k-divisions {
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.k-division-row {
  display: grid;
  grid-template-columns: 0.95fr 1fr;
  gap: 28px;
  align-items: stretch;
  min-height: 380px;
}
.k-division-row.flip { grid-template-columns: 1fr 0.95fr; }
.k-division-row.flip .k-division-art   { order: 2; }
.k-division-row.flip .k-division-body  { order: 1; }
.k-division-art {
  border-radius: var(--radius-xxxl);
  overflow: hidden;
  position: relative;
  min-height: 380px;
  background: var(--k-canvas-2);
}
.k-division-art svg { width: 100%; height: 100%; display: block; }
.k-division-body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 16px 32px;
  gap: 4px;
  position: relative;
}
.k-division-row.flip .k-division-body { padding-left: 0; padding-right: 32px; }
.k-division-row:not(.flip) .k-division-body { padding-right: 0; padding-left: 32px; }
.k-division-num {
  font: 700 64px/1 var(--font-display);
  letter-spacing: -0.04em;
  color: var(--k-accent);
  display: block;
  margin-bottom: 10px;
}
.k-division-tag {
  font: 600 11px/1 var(--font-body);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--k-ink-3);
  display: inline-block;
  margin-bottom: 18px;
}
.k-division-title {
  font: 700 40px/1.05 var(--font-display);
  letter-spacing: -0.035em;
  color: var(--k-ink);
  margin: 0 0 16px;
  text-wrap: balance;
}
.k-division-body p {
  font: 400 17px/1.55 var(--font-body);
  color: var(--k-ink-2);
  margin: 0 0 24px;
  max-width: 500px;
}
.k-division-services {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}
.k-division-service {
  font: 600 13px/1 var(--font-body);
  color: var(--k-ink-2);
  letter-spacing: -0.01em;
  padding: 8px 14px;
  background: var(--k-canvas-2);
  border: 1px solid var(--k-hairline);
  border-radius: var(--radius-full);
}
.k-division-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font: 700 14px/1 var(--font-body);
  letter-spacing: -0.01em;
  color: var(--k-ink);
  background: transparent;
  border: 0;
  cursor: pointer;
  padding: 0;
  align-self: flex-start;
}
.k-division-cta:hover { color: var(--k-accent); }
.k-division-cta svg { transition: transform 200ms ease-out; }
.k-division-cta:hover svg { transform: translateX(4px); }

/* Big numbered marker pinned to art */
.k-division-art .corner-mark {
  position: absolute;
  top: 24px; left: 24px;
  font: 700 13px/1 var(--font-body);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--k-canvas);
  background: rgba(21,17,13,0.4);
  padding: 8px 12px;
  border-radius: var(--radius-full);
  backdrop-filter: blur(8px);
  z-index: 2;
}
@media (max-width: 800px) {
  .k-division-row, .k-division-row.flip { grid-template-columns: 1fr; }
  .k-division-row.flip .k-division-art   { order: 1; }
  .k-division-row.flip .k-division-body  { order: 2; }
  .k-division-row .k-division-body,
  .k-division-row.flip .k-division-body { padding: 8px 4px; }
}

/* ============================================================
   Events coming soon
   ============================================================ */
.k-coming {
  background: var(--k-canvas-2);
  border-radius: var(--radius-xxxl);
  padding: 80px 56px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 48px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.k-coming-art {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.4;
  z-index: 0;
}
.k-coming-art svg { width: 100%; height: 100%; }
.k-coming-copy { position: relative; z-index: 1; }
.k-coming .k-eyebrow { color: var(--k-accent); }
.k-coming h3 {
  font: 700 56px/1.02 var(--font-display);
  letter-spacing: -0.04em;
  color: var(--k-ink);
  margin: 16px 0 20px;
  text-wrap: balance;
}
.k-coming h3 .accent { color: var(--k-accent); font-style: italic; }
.k-coming p {
  font: 400 18px/1.55 var(--font-body);
  color: var(--k-ink-2);
  max-width: 520px;
  margin: 0 0 28px;
}
.k-coming-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.k-coming-list {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.k-coming-item {
  display: grid;
  grid-template-columns: 88px 1fr auto;
  gap: 18px;
  align-items: center;
  padding: 20px 22px;
  background: var(--k-canvas);
  border: 1px solid var(--k-hairline-soft);
  border-radius: var(--radius-xl);
}
.k-coming-item .when {
  font: 700 13px/1 var(--font-body);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--k-accent);
}
.k-coming-item .what {
  font: 700 17px/1.2 var(--font-display);
  letter-spacing: -0.02em;
  color: var(--k-ink);
}
.k-coming-item .what small {
  display: block;
  font: 500 12px/1.4 var(--font-body);
  color: var(--k-ink-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 4px;
}
.k-coming-item .status {
  font: 600 11px/1 var(--font-body);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 10px;
  border-radius: var(--radius-full);
  background: var(--k-canvas-2);
  color: var(--k-ink-3);
}
.k-coming-item .status.soon { background: var(--k-accent-soft); color: var(--k-accent-deep); }
@media (max-width: 800px) {
  .k-coming { grid-template-columns: 1fr; padding: 48px 28px; }
  .k-coming h3 { font-size: 40px; }
}

/* ============================================================
   Experiences (ticket cards)
   ============================================================ */
.k-experiences {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.k-exp-card {
  border-radius: var(--radius-xxl);
  overflow: hidden;
  background: var(--k-canvas);
  border: 1px solid var(--k-hairline-soft);
  display: flex;
  flex-direction: column;
  transition: transform 200ms ease-out, box-shadow 200ms ease-out;
  cursor: pointer;
}
.k-exp-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 16px 32px -12px rgba(21, 17, 13, 0.15);
}
.k-exp-art {
  aspect-ratio: 4 / 3;
  position: relative;
  overflow: hidden;
}
.k-exp-art svg { width: 100%; height: 100%; display: block; }
.k-exp-date {
  position: absolute;
  top: 16px; left: 16px;
  background: var(--k-canvas);
  border-radius: var(--radius-lg);
  padding: 8px 12px;
  text-align: center;
  font: 700 11px/1 var(--font-body);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--k-ink);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.k-exp-date .day {
  display: block;
  font: 700 22px/1 var(--font-display);
  letter-spacing: -0.02em;
  margin-top: 4px;
  color: var(--k-accent);
}
.k-exp-tag {
  position: absolute;
  top: 16px; right: 16px;
  background: rgba(21,17,13,0.85);
  color: var(--k-canvas);
  padding: 6px 12px;
  border-radius: var(--radius-full);
  font: 600 11px/1 var(--font-body);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  backdrop-filter: blur(6px);
}
.k-exp-body {
  padding: 22px 22px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.k-exp-title {
  font: 700 22px/1.15 var(--font-display);
  letter-spacing: -0.025em;
  color: var(--k-ink);
}
.k-exp-meta {
  font: 500 13px/1.4 var(--font-body);
  color: var(--k-ink-3);
  display: flex; align-items: center; gap: 10px;
}
.k-exp-meta svg { color: var(--k-ink-3); }
.k-exp-foot {
  margin-top: 12px;
  padding-top: 14px;
  border-top: 1px solid var(--k-hairline-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.k-exp-price {
  font: 700 16px/1 var(--font-display);
  letter-spacing: -0.02em;
  color: var(--k-ink);
}
.k-exp-price .from { font: 500 11px/1 var(--font-body); color: var(--k-ink-3); letter-spacing: 0.06em; text-transform: uppercase; margin-right: 6px; }
.k-exp-tickets {
  font: 600 12px/1 var(--font-body);
  color: var(--k-ink-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.k-exp-tickets .lo { color: var(--k-accent); }

/* ============================================================
   Impact strip (stats / cultural impact band)
   ============================================================ */
.k-impact {
  background: var(--k-ink);
  border-radius: var(--radius-xxxl);
  padding: 64px 56px;
  color: var(--k-canvas);
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 32px;
  align-items: flex-end;
  position: relative;
  overflow: hidden;
}
.k-impact-copy {
  grid-column: 1 / -1;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
  max-width: 720px;
}
.k-impact-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.35;
}
.k-impact-bg svg { width: 100%; height: 100%; }
.k-impact-copy { position: relative; z-index: 1; }
.k-impact-copy h3 {
  font: 700 36px/1.05 var(--font-display);
  letter-spacing: -0.03em;
  color: var(--k-canvas);
  margin: 16px 0 0;
  text-wrap: balance;
}
.k-impact-copy .k-eyebrow { color: var(--k-gold); }
.k-impact-stat {
  position: relative; z-index: 1;
}
.k-impact-stat .num {
  font: 700 64px/1 var(--font-display);
  letter-spacing: -0.04em;
  color: var(--k-canvas);
  display: block;
}
.k-impact-stat .num .unit {
  font-size: 36px;
  color: var(--k-accent);
  margin-left: 2px;
}
.k-impact-stat .lbl {
  font: 500 13px/1.4 var(--font-body);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--k-canvas);
  opacity: 0.75;
  margin-top: 12px;
  display: block;
  max-width: 200px;
}

/* ============================================================
   Mission
   ============================================================ */
.k-mission {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  align-items: stretch;
}
.k-mission-card {
  background: var(--k-canvas-2);
  border-radius: var(--radius-xxxl);
  padding: 56px 56px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 480px;
}
.k-mission-card.art {
  background: var(--k-plum);
  padding: 0;
  overflow: hidden;
  position: relative;
}
.k-mission-card.art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.k-mission-card.art .k-mission-overlay {
  position: absolute;
  inset: auto 0 0 0;
  padding: 40px;
  color: var(--k-canvas);
  z-index: 1;
}
.k-mission-card.art .k-mission-overlay strong {
  font: 700 18px/1.3 var(--font-display);
  letter-spacing: -0.02em;
  display: block;
  margin-bottom: 6px;
}
.k-mission-card.art .k-mission-overlay span {
  font: 400 14px/1.5 var(--font-body);
  opacity: 0.85;
}
.k-mission-card h3 {
  font: 700 44px/1.05 var(--font-display);
  letter-spacing: -0.035em;
  color: var(--k-ink);
  margin: 16px 0 24px;
  text-wrap: balance;
}
.k-mission-card p {
  font: 400 17px/1.55 var(--font-body);
  color: var(--k-ink-2);
  margin: 0 0 12px;
}
.k-mission-card p .accent { color: var(--k-accent); font-weight: 600; }
.k-mission-card .contact {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--k-hairline);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.k-mission-card .contact dt {
  font: 500 11px/1 var(--font-body);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--k-ink-3);
  margin-bottom: 8px;
}
.k-mission-card .contact dd {
  font: 500 15px/1.4 var(--font-body);
  color: var(--k-ink);
  margin: 0;
}

/* ============================================================
   Partners / press wall
   ============================================================ */
.k-partners {
  margin-top: var(--space-section);
}
.k-partners-head {
  text-align: center;
  margin-bottom: 32px;
}
.k-partners-head .k-eyebrow { color: var(--k-ink-3); }
.k-partners-head h4 {
  font: 600 22px/1.3 var(--font-display);
  letter-spacing: -0.02em;
  color: var(--k-ink-2);
  margin-top: 14px;
  text-wrap: balance;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}
.k-partners-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 16px;
  padding: 32px 0;
  border-top: 1px solid var(--k-hairline);
  border-bottom: 1px solid var(--k-hairline);
}
.k-partner {
  display: flex;
  align-items: center;
  justify-content: center;
  font: 700 16px/1 var(--font-display);
  letter-spacing: -0.02em;
  color: var(--k-ink-3);
  opacity: 0.7;
  transition: opacity 150ms ease-out, color 150ms ease-out;
  text-align: center;
  height: 48px;
}
.k-partner:hover { opacity: 1; color: var(--k-ink); }

/* ============================================================
   FAQ
   ============================================================ */
.k-faq-stack {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--k-hairline);
}
.k-faq-item {
  border-bottom: 1px solid var(--k-hairline);
  padding: 0;
}
.k-faq-q {
  width: 100%;
  display: flex; justify-content: space-between; align-items: center;
  background: transparent; border: 0;
  padding: 28px 0;
  cursor: pointer;
  font: 600 22px/1.3 var(--font-display);
  letter-spacing: -0.02em;
  color: var(--k-ink);
  text-align: left;
}
.k-faq-q .k-faq-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--k-canvas-2);
  display: grid; place-items: center;
  transition: background 200ms ease-out, transform 200ms ease-out;
  flex: none;
}
.k-faq-item.open .k-faq-icon {
  background: var(--k-ink);
  color: var(--k-canvas);
}
.k-faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 300ms ease-in-out, padding 300ms ease-in-out;
  font: 400 16px/1.6 var(--font-body);
  color: var(--k-ink-2);
}
.k-faq-item.open .k-faq-a {
  max-height: 320px;
  padding-bottom: 28px;
}

/* ============================================================
   Newsletter
   ============================================================ */
.k-newsletter {
  background: var(--k-accent);
  border-radius: var(--radius-xxxl);
  padding: 56px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 40px;
  align-items: center;
  color: var(--k-canvas);
}
.k-newsletter h3 {
  font: 700 40px/1.05 var(--font-display);
  letter-spacing: -0.035em;
  color: var(--k-canvas);
  margin: 12px 0 14px;
  text-wrap: balance;
}
.k-newsletter p {
  font: 400 16px/1.55 var(--font-body);
  color: var(--k-canvas);
  opacity: 0.9;
  margin: 0;
  max-width: 420px;
}
.k-newsletter-form {
  display: flex;
  background: var(--k-canvas);
  border-radius: var(--radius-full);
  padding: 6px 6px 6px 24px;
  align-items: center;
}
.k-newsletter-form input {
  flex: 1;
  border: 0;
  background: transparent;
  font: 500 15px/1.4 var(--font-body);
  color: var(--k-ink);
  outline: none;
  padding: 12px 0;
}
.k-newsletter-form input::placeholder { color: var(--k-ink-3); }
.k-newsletter-form button {
  background: var(--k-ink);
  color: var(--k-canvas);
  border: 0;
  font: 700 14px/1 var(--font-body);
  padding: 14px 24px;
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: background 150ms ease-out;
}
.k-newsletter-form button:hover { background: var(--k-ink-2); }
.k-newsletter-form.ok button { background: var(--k-canvas-2); color: var(--k-ink); }

/* ============================================================
   Footer
   ============================================================ */
.k-footer {
  margin-top: var(--space-section-lg);
  background: var(--k-ink);
  color: var(--k-canvas);
  padding: 80px 0 32px;
}
.k-footer-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 40px;
}
.k-footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 32px;
  padding-bottom: 56px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.k-footer-brand {
  display: flex; flex-direction: column; gap: 16px;
}
.k-footer-brand .k-logo-mark { background: var(--k-canvas); color: var(--k-ink); }
.k-footer-brand p {
  font: 400 14px/1.55 var(--font-body);
  color: var(--k-canvas);
  opacity: 0.65;
  max-width: 280px;
}
.k-footer-col h5 {
  font: 600 12px/1 var(--font-body);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--k-canvas);
  opacity: 0.5;
  margin-bottom: 18px;
}
.k-footer-col ul {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 10px;
}
.k-footer-col a {
  font: 500 14px/1.4 var(--font-body);
  color: var(--k-canvas);
  text-decoration: none;
  opacity: 0.85;
  transition: opacity 150ms ease-out, color 150ms ease-out;
}
.k-footer-col a:hover { opacity: 1; color: var(--k-accent); }
.k-footer-bottom {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 28px;
  font: 500 12px/1.4 var(--font-body);
  color: var(--k-canvas);
  opacity: 0.5;
  gap: 16px;
  flex-wrap: wrap;
}

/* ============================================================
   Modal (ticket booking)
   ============================================================ */
.k-modal-scrim {
  position: fixed; inset: 0;
  background: rgba(21, 17, 13, 0.55);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: grid; place-items: center;
  padding: 24px;
  animation: k-fade 200ms ease-out;
}
@keyframes k-fade { from { opacity: 0; } to { opacity: 1; } }
.k-modal {
  background: var(--k-canvas);
  border-radius: var(--radius-xxxl);
  width: min(580px, 100%);
  padding: 40px;
  position: relative;
  animation: k-rise 240ms cubic-bezier(.22,.85,.32,1);
}
@keyframes k-rise { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.k-modal-close {
  position: absolute;
  top: 18px; right: 18px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--k-hairline);
  background: var(--k-canvas);
  display: grid; place-items: center;
  cursor: pointer;
  color: var(--k-ink);
}
.k-modal-close:hover { background: var(--k-canvas-2); }
.k-modal h4 {
  font: 700 28px/1.1 var(--font-display);
  letter-spacing: -0.03em;
  color: var(--k-ink);
  margin: 0 0 4px;
}
.k-modal .meta {
  font: 500 13px/1.4 var(--font-body);
  color: var(--k-ink-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 28px;
}
.k-tier {
  border: 1px solid var(--k-hairline);
  border-radius: var(--radius-xl);
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 150ms ease-out, background 150ms ease-out;
}
.k-tier:hover { border-color: var(--k-ink-3); }
.k-tier.selected {
  border-color: var(--k-accent);
  border-width: 2px;
  padding: 17px 19px;
  background: var(--k-accent-soft);
}
.k-tier-name { font: 700 16px/1.2 var(--font-display); letter-spacing: -0.02em; color: var(--k-ink); }
.k-tier-desc { font: 400 13px/1.4 var(--font-body); color: var(--k-ink-3); margin-top: 4px; }
.k-tier-price { font: 700 22px/1 var(--font-display); letter-spacing: -0.02em; color: var(--k-ink); }
.k-tier.sold { opacity: 0.45; cursor: not-allowed; }
.k-tier.sold .k-tier-price { text-decoration: line-through; color: var(--k-ink-3); }
.k-qty {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0;
  border-top: 1px solid var(--k-hairline);
  margin-top: 20px;
}
.k-qty-label { font: 600 15px/1.2 var(--font-body); color: var(--k-ink); }
.k-qty-controls { display: flex; align-items: center; gap: 14px; }
.k-qty-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--k-hairline);
  background: var(--k-canvas);
  cursor: pointer;
  font: 700 20px/1 var(--font-body);
  color: var(--k-ink);
}
.k-qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.k-qty-val { font: 700 18px/1 var(--font-display); min-width: 24px; text-align: center; }
.k-modal-total {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 18px 0 24px;
}
.k-modal-total .lbl { font: 500 14px/1 var(--font-body); color: var(--k-ink-3); letter-spacing: 0.04em; text-transform: uppercase; }
.k-modal-total .val { font: 700 32px/1 var(--font-display); letter-spacing: -0.03em; color: var(--k-ink); }
.k-modal-cta {
  width: 100%;
  background: var(--k-accent);
  color: var(--k-canvas);
  border: 0;
  border-radius: var(--radius-full);
  padding: 18px;
  font: 700 15px/1 var(--font-body);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 150ms ease-out;
}
.k-modal-cta:hover { background: var(--k-accent-deep); }
.k-modal-cta:disabled { background: var(--k-canvas-2); color: var(--k-ink-3); cursor: not-allowed; }

/* responsive nudges */
@media (max-width: 980px) {
  .k-hero { grid-template-columns: 1fr; }
  .k-impact { grid-template-columns: 1fr; gap: 24px; padding: 48px 32px; }
  .k-mission { grid-template-columns: 1fr; }
  .k-newsletter { grid-template-columns: 1fr; padding: 40px; }
  .k-footer-grid { grid-template-columns: 1fr 1fr; }

  /* Photos: let landscape images show nearly in full instead of
     cropping inside tall fixed-height boxes. */
  .k-hero-art {
    min-height: 0;
    aspect-ratio: 4 / 3;
  }
  .k-hero-copy-card { min-height: 0; }
}

/* ============================================================
   Mobile (≤ 720px) — nav reflow + image fit + section stacking
   ============================================================ */
@media (max-width: 720px) {

  /* --- Nav: stop the single-row overflow that pushed the page
     off-center. Logo + CTA on row one; jump-links become a
     horizontally scrollable pill row underneath. --- */
  .k-nav-row {
    flex-wrap: wrap;
    gap: 10px 8px;
    padding: 12px 20px;
    max-width: 100%;
  }
  .k-logo { flex: 1 1 auto; min-width: 0; }
  .k-logo-text { font-size: 15px; }
  .k-nav-spacer { display: none; }
  .k-icon-btn { display: none; }
  .k-cta-pill { padding: 10px 16px; }
  .k-nav .k-cta-pill { order: 2; flex: none; }
  .k-nav-links {
    order: 3;
    flex-basis: 100%;
    margin-left: 0;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .k-nav-links::-webkit-scrollbar { display: none; }

  /* --- Hero copy padding eases up on small screens --- */
  .k-hero-copy-card { padding: 36px 28px 32px; }
  .k-hero-title { font-size: 56px; }
  .k-hero-sub { font-size: 17px; }
  .k-hero-meta { gap: 20px; flex-wrap: wrap; }

  /* --- Division & mission photos: show full landscape frame --- */
  .k-division-row,
  .k-division-row.flip { min-height: 0; }
  .k-division-art {
    min-height: 0;
    aspect-ratio: 4 / 3;
  }
  .k-division-num { font-size: 52px; }
  .k-division-title { font-size: 32px; }

  .k-mission-card { min-height: 0; padding: 36px 28px; }
  .k-mission-card.art {
    min-height: 0;
    aspect-ratio: 4 / 3;
  }
  .k-mission-card h3 { font-size: 34px; }

  /* --- Section headers stack instead of forcing a right rail --- */
  .k-section-head {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }
  .k-section-lede {
    text-align: left;
    max-width: 100%;
  }

  /* --- Coming-soon rows breathe; event items keep within width --- */
  .k-coming { padding: 40px 22px; }
  .k-coming h3 { font-size: 34px; }
  .k-coming-item {
    grid-template-columns: 1fr auto;
    gap: 6px 14px;
  }
  .k-coming-item .when { grid-column: 1 / -1; }

  /* --- Newsletter / footer tidy --- */
  .k-newsletter { padding: 32px 24px; }
  .k-newsletter h3 { font-size: 32px; }
  .k-footer-grid { grid-template-columns: 1fr 1fr; gap: 28px; }
  .k-footer-inner { padding: 0 20px; }
}

@media (max-width: 480px) {
  .k-hero-title { font-size: 46px; }
  .k-coming h3 { font-size: 30px; }
  .k-footer-grid { grid-template-columns: 1fr; gap: 24px; }
}

  <script type="text/babel" data-from="placeholders.jsx">
/* ============================================================
   Editorial placeholder compositions for Kelly Entertainment.
   No photography — abstract SVG shapes evoking the four divisions
   (stage lights, vinyl, architecture, partnerships) and event
   posters. Built from a consistent palette so they read as a
   coherent visual system, not random gradients.
   ============================================================ */

const K_COLORS = {
  canvas: "#F4EFE6",
  canvas2: "#EDE5D6",
  canvas3: "#E4D9C2",
  ink: "#15110D",
  ink2: "#3A332B",
  accent: "#E63E11",
  accentDeep: "#B82A05",
  gold: "#D4A14A",
  plum: "#3A1B2E",
  olive: "#4A4D2B",
};

/* ---- Hero composition: layered stage-light disc with concentric rings ---- */
function HeroArt() {
  return (
    <svg viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      {/* deep ink ground */}
      <rect width="600" height="600" fill={K_COLORS.ink} />

      {/* concentric "spotlight" rings */}
      <g transform="translate(310 320)">
        {Array.from({ length: 7 }).map((_, i) => (
          <circle
            key={i}
            r={60 + i * 38}
            fill="none"
            stroke={i % 2 === 0 ? K_COLORS.accent : K_COLORS.gold}
            strokeWidth={i === 0 ? 0 : 1.5}
            opacity={1 - i * 0.11}
          />
        ))}
        <circle r="60" fill={K_COLORS.accent} />
        <circle r="18" fill={K_COLORS.canvas} />
      </g>

      {/* angled marquee bars - bottom left */}
      <g transform="translate(-30 460) rotate(-12)">
        <rect width="240" height="14" fill={K_COLORS.accent} />
        <rect y="24" width="180" height="14" fill={K_COLORS.gold} />
        <rect y="48" width="120" height="14" fill={K_COLORS.canvas} opacity="0.85" />
      </g>

      {/* top tag block */}
      <g transform="translate(40 40)">
        <rect width="120" height="3" fill={K_COLORS.gold} />
        <text x="0" y="24" fill={K_COLORS.canvas} fontFamily="Bricolage Grotesque, sans-serif" fontWeight="600" fontSize="13" letterSpacing="2">
          KE / 2026 SEASON
        </text>
      </g>

      {/* subtle bottom grid texture */}
      <g opacity="0.18">
        {Array.from({ length: 12 }).map((_, i) => (
          <line key={i} x1={50 * i} y1="540" x2={50 * i} y2="600" stroke={K_COLORS.canvas} strokeWidth="0.5" />
        ))}
      </g>

      {/* tiny accent dot */}
      <circle cx="540" cy="80" r="6" fill={K_COLORS.accent} />
    </svg>
  );
}

/* ---- Division 1: Live Entertainment — stage with overhead lights ---- */
function LiveArt() {
  return (
    <svg viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="liveCone" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={K_COLORS.accent} stopOpacity="0.85" />
          <stop offset="100%" stopColor={K_COLORS.accent} stopOpacity="0" />
        </linearGradient>
        <linearGradient id="liveCone2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={K_COLORS.gold} stopOpacity="0.65" />
          <stop offset="100%" stopColor={K_COLORS.gold} stopOpacity="0" />
        </linearGradient>
      </defs>
      <rect width="600" height="360" fill={K_COLORS.ink} />

      setStatus("error");

        mode: "no-cors",

          email,
          source: "kellyentertainmentco.com",
          submittedAt: new Date().toISOString(),

      });
      setStatus("done");
    } catch (err) {

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

  <script type="text/babel">
    const KELLY_TWEAKS = /*EDITMODE-BEGIN*/{
      "palette": "vermillion",
      "density": "comfortable",
      "showStats": true
    }/*EDITMODE-END*/;

    const PALETTES = {
      vermillion: {
        label: "Vermillion",
        vars: {
          "--k-accent": "#E63E11",
          "--k-accent-deep": "#B82A05",
          "--k-accent-soft": "#FBE0D2",
          "--k-gold": "#D4A14A",
          "--k-plum": "#3A1B2E",
          "--k-canvas": "#F4EFE6",
          "--k-canvas-2": "#EDE5D6",
          "--k-hairline": "#D6CCB8",
          "--k-hairline-soft": "#E2D9C6",
        },
        swatches: ["#E63E11", "#15110D", "#F4EFE6", "#D4A14A"]
      },
      cobalt: {
        label: "Cobalt + Ivory",
        vars: {
          "--k-accent": "#1d4ed8",
          "--k-accent-deep": "#1e40af",
          "--k-accent-soft": "#dde7ff",
          "--k-gold": "#f5b400",
          "--k-plum": "#1c1a4a",
          "--k-canvas": "#F6F4EE",
          "--k-canvas-2": "#ECE8DC",
          "--k-hairline": "#D6D0BC",
          "--k-hairline-soft": "#E2DCC8",
        },
        swatches: ["#1d4ed8", "#15110D", "#F6F4EE", "#f5b400"]
      },
      forest: {
        label: "Forest + Saffron",
        vars: {
          "--k-accent": "#E8A52A",
          "--k-accent-deep": "#B8801A",
          "--k-accent-soft": "#F8E8C8",
          "--k-gold": "#D9633D",
          "--k-plum": "#162D26",
          "--k-canvas": "#EFEFE3",
          "--k-canvas-2": "#E2E4D2",
          "--k-hairline": "#C8CAB4",
          "--k-hairline-soft": "#D8D9C5",
        },
        swatches: ["#E8A52A", "#162D26", "#EFEFE3", "#D9633D"]
      },
    };

    function applyPalette(name) {
      const p = PALETTES[name] || PALETTES.vermillion;
      const root = document.documentElement;
      Object.entries(p.vars).forEach(([k, v]) => root.style.setProperty(k, v));
    }

    function App() {
      const [activeNav, setActiveNav] = React.useState("");
      const [tweaks, setTweak]        = useTweaks(KELLY_TWEAKS);

      React.useEffect(() => { applyPalette(tweaks.palette); }, [tweaks.palette]);
      React.useEffect(() => {
        document.body.classList.toggle("density-compact", tweaks.density === "compact");
      }, [tweaks.density]);

      return (
        <React.Fragment>
          <PromoStrip />
          <Nav active={activeNav} setActive={setActiveNav} />

          <main className="page">
            <Hero />
            <Divisions />
            <EventsComingSoon />
            {tweaks.showStats && <Impact />}
            <Mission />
            <Faq />
            <Contact />
          </main>

          <Footer />

          <TweaksPanel title="Tweaks">
            <TweakSection title="Palette">
              <TweakColor
                label="Brand palette"
                value={tweaks.palette}
                onChange={(v) => setTweak("palette", v)}
                options={Object.entries(PALETTES).map(([k, p]) => ({
                  value: k, label: p.label, color: p.swatches
                }))}
              />
            </TweakSection>
            <TweakSection title="Layout">
              <TweakRadio
                label="Density"
                value={tweaks.density}
                onChange={(v) => setTweak("density", v)}
                options={[
                  { value: "comfortable", label: "Comfortable" },
                  { value: "compact",     label: "Compact" },
                ]}
              />
              <TweakToggle
                label="Values band"
                value={tweaks.showStats}
                onChange={(v) => setTweak("showStats", v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
