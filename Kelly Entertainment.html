<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kelly Entertainment Co. — Where culture meets opportunity.</title>
  <link rel="stylesheet" href="ds/colors_and_type.css" />
  <link rel="stylesheet" href="ds/marketing.css" />
  <link rel="stylesheet" href="kelly.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="placeholders.jsx"></script>
  <script type="text/babel" src="kelly-app.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const KELLY_TWEAKS = /*EDITMODE-BEGIN*/{
      "palette": "vermillion",
      "density": "comfortable",
      "showStats": true
    }/*EDITMODE-END*/;

    const PALETTES = {
      vermillion: {
        label: "Vermillion",
        vars: {
          "--k-accent": "#E63E11",
          "--k-accent-deep": "#B82A05",
          "--k-accent-soft": "#FBE0D2",
          "--k-gold": "#D4A14A",
          "--k-plum": "#3A1B2E",
          "--k-canvas": "#F4EFE6",
          "--k-canvas-2": "#EDE5D6",
          "--k-hairline": "#D6CCB8",
          "--k-hairline-soft": "#E2D9C6",
        },
        swatches: ["#E63E11", "#15110D", "#F4EFE6", "#D4A14A"]
      },
      cobalt: {
        label: "Cobalt + Ivory",
        vars: {
          "--k-accent": "#1d4ed8",
          "--k-accent-deep": "#1e40af",
          "--k-accent-soft": "#dde7ff",
          "--k-gold": "#f5b400",
          "--k-plum": "#1c1a4a",
          "--k-canvas": "#F6F4EE",
          "--k-canvas-2": "#ECE8DC",
          "--k-hairline": "#D6D0BC",
          "--k-hairline-soft": "#E2DCC8",
        },
        swatches: ["#1d4ed8", "#15110D", "#F6F4EE", "#f5b400"]
      },
      forest: {
        label: "Forest + Saffron",
        vars: {
          "--k-accent": "#E8A52A",
          "--k-accent-deep": "#B8801A",
          "--k-accent-soft": "#F8E8C8",
          "--k-gold": "#D9633D",
          "--k-plum": "#162D26",
          "--k-canvas": "#EFEFE3",
          "--k-canvas-2": "#E2E4D2",
          "--k-hairline": "#C8CAB4",
          "--k-hairline-soft": "#D8D9C5",
        },
        swatches: ["#E8A52A", "#162D26", "#EFEFE3", "#D9633D"]
      },
    };

    function applyPalette(name) {
      const p = PALETTES[name] || PALETTES.vermillion;
      const root = document.documentElement;
      Object.entries(p.vars).forEach(([k, v]) => root.style.setProperty(k, v));
    }

    function App() {
      const [activeNav, setActiveNav] = React.useState("");
      const [tweaks, setTweak]        = useTweaks(KELLY_TWEAKS);

      React.useEffect(() => { applyPalette(tweaks.palette); }, [tweaks.palette]);
      React.useEffect(() => {
        document.body.classList.toggle("density-compact", tweaks.density === "compact");
      }, [tweaks.density]);

      return (
        <React.Fragment>
          <PromoStrip />
          <Nav active={activeNav} setActive={setActiveNav} />

          <main className="page">
            <Hero />
            <Divisions />
            <EventsComingSoon />
            {tweaks.showStats && <Impact />}
            <Mission />
            <Faq />
            <Contact />
          </main>

          <Footer />

          <TweaksPanel title="Tweaks">
            <TweakSection title="Palette">
              <TweakColor
                label="Brand palette"
                value={tweaks.palette}
                onChange={(v) => setTweak("palette", v)}
                options={Object.entries(PALETTES).map(([k, p]) => ({
                  value: k, label: p.label, color: p.swatches
                }))}
              />
            </TweakSection>
            <TweakSection title="Layout">
              <TweakRadio
                label="Density"
                value={tweaks.density}
                onChange={(v) => setTweak("density", v)}
                options={[
                  { value: "comfortable", label: "Comfortable" },
                  { value: "compact",     label: "Compact" },
                ]}
              />
              <TweakToggle
                label="Values band"
                value={tweaks.showStats}
                onChange={(v) => setTweak("showStats", v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <style id="density-compact-overrides">
    body.density-compact .page { padding-bottom: var(--space-section-lg); }
    body.density-compact .k-section { margin-top: var(--space-section); }
    body.density-compact .k-hero-copy-card { padding: 40px 40px 36px; min-height: 480px; }
    body.density-compact .k-hero-art { min-height: 480px; }
    body.density-compact .k-hero-title { font-size: 64px; }
    body.density-compact .k-section-title { font-size: 44px; }
    body.density-compact .k-division { min-height: 380px; }
    body.density-compact .k-division-body { padding: 22px 26px; }
    body.density-compact .k-impact { padding: 48px 40px; }
    body.density-compact .k-mission-card { padding: 40px; min-height: 420px; }
    body.density-compact .k-newsletter { padding: 40px; }
    body.density-compact .k-newsletter h3 { font-size: 30px; }
  </style>
</body>
</html>
